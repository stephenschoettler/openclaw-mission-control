<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background: dark rounded square -->
  <rect width="32" height="32" rx="6" fill="#0f172a"/>
  <!-- Border glow -->
  <rect x="1" y="1" width="30" height="30" rx="5" fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.8"/>
  <!-- Pixel agent body (retro RPG character) -->
  <!-- Hat/hair (green triangle like in the app) -->
  <polygon points="16,5 12,11 20,11" fill="#22c55e"/>
  <!-- Head -->
  <rect x="13" y="11" width="6" height="5" rx="1" fill="#fbbf24"/>
  <!-- Eyes -->
  <rect x="14" y="13" width="1.5" height="1.5" fill="#0f172a"/>
  <rect x="16.5" y="13" width="1.5" height="1.5" fill="#0f172a"/>
  <!-- Body -->
  <rect x="12" y="17" width="8" height="6" rx="1" fill="#6366f1"/>
  <!-- Arms -->
  <rect x="10" y="17" width="2" height="4" rx="0.5" fill="#6366f1"/>
  <rect x="20" y="17" width="2" height="4" rx="0.5" fill="#6366f1"/>
  <!-- Legs -->
  <rect x="13" y="23" width="2.5" height="3" rx="0.5" fill="#334155"/>
  <rect x="16.5" y="23" width="2.5" height="3" rx="0.5" fill="#334155"/>
  <!-- Shoes -->
  <rect x="12.5" y="25.5" width="3" height="1.5" rx="0.5" fill="#94a3b8"/>
  <rect x="16.5" y="25.5" width="3" height="1.5" rx="0.5" fill="#94a3b8"/>
</svg>
